<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CrossPlaylist 試作</title>
<style>
  :root {
    --bg: #16181d; --panel: #1f232b; --panel2: #262b35;
    --text: #e8eaed; --sub: #9aa0a6; --accent: #4da3ff; --nico: #f5a623; --yt: #ff5252;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Segoe UI", "Yu Gothic UI", sans-serif; background: var(--bg); color: var(--text); }
  header { padding: 10px 16px; background: var(--panel); display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-size: 16px; margin: 0; }
  header span { color: var(--sub); font-size: 12px; }
  .wrap { display: flex; gap: 12px; padding: 12px; align-items: flex-start; }
  .player-col { flex: 1 1 65%; min-width: 0; }
  #player-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
  #player-box iframe, #player-box > div { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  #now-playing { margin-top: 8px; font-size: 14px; color: var(--sub); min-height: 1.4em; }
  .controls { margin-top: 8px; display: flex; gap: 8px; }
  button { background: var(--panel2); color: var(--text); border: 1px solid #333a46; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  button:hover { background: #313847; }
  button.active { border-color: var(--accent); color: var(--accent); }
  .list-col { flex: 1 1 35%; min-width: 300px; background: var(--panel); border-radius: 8px; padding: 12px; }
  textarea { width: 100%; height: 64px; background: var(--panel2); color: var(--text); border: 1px solid #333a46; border-radius: 6px; padding: 8px; font-size: 12px; resize: vertical; }
  #add-btn { margin-top: 6px; width: 100%; }
  #playlist { list-style: none; margin: 12px 0 0; padding: 0; max-height: 70vh; overflow-y: auto; }
  #playlist li {
    display: flex; align-items: center; gap: 8px; padding: 7px 8px; margin-bottom: 4px;
    background: var(--panel2); border-radius: 6px; cursor: grab; font-size: 13px;
    border-left: 3px solid transparent;
  }
  #playlist li.yt { border-left-color: var(--yt); }
  #playlist li.nico { border-left-color: var(--nico); }
  #playlist li.current { outline: 1px solid var(--accent); background: #263242; }
  #playlist li.dragover { border-top: 2px solid var(--accent); }
  #playlist .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  #playlist .badge { font-size: 10px; color: var(--sub); }
  #playlist .del { background: none; border: none; color: var(--sub); padding: 2px 6px; }
  #playlist .del:hover { color: var(--yt); }
  .hint { font-size: 11px; color: var(--sub); margin-top: 8px; line-height: 1.6; }
</style>
</head>
<body>
<header>
  <h1>CrossPlaylist 試作</h1>
  <span>YouTube × ニコニコ 統合プレイリスト — 公式埋め込み再生（再生数は元動画にカウント）</span>
</header>
<div id="file-warning" style="display:none; background:#5c2b2b; color:#ffd7d7; padding:8px 16px; font-size:13px;">
  ⚠ file:// で直接開かれています。この状態では YouTube / ニコニコの埋め込み再生が拒否されます（YouTubeエラー153等）。
  同じフォルダの <b>start.bat</b> をダブルクリックして起動してください。
</div>
<script>
  if (location.protocol === 'file:') document.currentScript.previousElementSibling.style.display = 'block';
</script>

<div class="wrap">
  <div class="player-col">
    <div id="player-box"><div id="player-slot"></div></div>
    <div id="now-playing">プレイリストから動画をクリックで再生開始</div>
    <div class="controls">
      <button id="prev-btn">⏮ 前へ</button>
      <button id="next-btn">次へ ⏭</button>
      <button id="shuffle-btn">🔀 シャッフル</button>
      <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--sub); margin-left:8px;">
        🔊 <input type="range" id="volume-slider" min="0" max="100" style="width:120px;">
        <span id="volume-label"></span>
      </label>
    </div>
  </div>

  <div class="list-col">
    <div style="display:flex; gap:4px; margin-bottom:8px;">
      <select id="list-select" style="flex:1; background:var(--panel2); color:var(--text); border:1px solid #333a46; border-radius:6px; padding:5px;"></select>
      <button id="list-new" title="新規プレイリスト">＋</button>
      <button id="list-rename" title="名前を変更">✎</button>
      <button id="list-del" title="このプレイリストを削除">🗑</button>
    </div>
    <textarea id="url-input" placeholder="動画URLを貼り付け（複数行OK）&#10;https://www.youtube.com/watch?v=...&#10;https://www.nicovideo.jp/watch/sm..."></textarea>
    <button id="add-btn">＋ 追加</button>
    <div id="add-status" style="font-size:12px; margin-top:6px; min-height:1.3em;"></div>
    <ul id="playlist"></ul>
    <div class="hint">
      クリックで再生 / ドラッグで並び替え / ✕で削除。<br>
      プレイリストはこのブラウザに自動保存（localStorage）。<br>
      チャンネル一括取り込みは次段階（APIキー要）。
    </div>
  </div>
</div>

<script>
// ---------- データ ----------
// v2: 複数プレイリスト {lists:[{name, items:[{platform,id,title}]}], active, volume}
const STORAGE_KEY = 'crossplaylist_v2';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
if (!state) {
  const v1 = JSON.parse(localStorage.getItem('crossplaylist_v1') || '[]'); // 旧データ移行
  state = { lists: [{ name: 'プレイリスト1', items: v1 }], active: 0, volume: 100 };
}
if (typeof state.volume !== 'number') state.volume = 100;
let playlist = state.lists[state.active].items;
let currentIndex = -1;
let shuffle = false;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ---------- プリセット（プレイリスト切替） ----------
function renderListSelect() {
  const sel = document.getElementById('list-select');
  sel.innerHTML = '';
  state.lists.forEach((l, i) => {
    const op = document.createElement('option');
    op.value = i; op.textContent = `${l.name}（${l.items.length}）`;
    sel.appendChild(op);
  });
  sel.value = state.active;
}
function switchList(i) {
  state.active = i;
  playlist = state.lists[i].items;
  currentIndex = -1;
  save(); renderListSelect(); renderList();
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('list-select').onchange = e => switchList(+e.target.value);
  document.getElementById('list-new').onclick = () => {
    const name = prompt('新しいプレイリスト名', `プレイリスト${state.lists.length + 1}`);
    if (!name) return;
    state.lists.push({ name, items: [] });
    switchList(state.lists.length - 1);
  };
  document.getElementById('list-rename').onclick = () => {
    const name = prompt('プレイリスト名を変更', state.lists[state.active].name);
    if (!name) return;
    state.lists[state.active].name = name;
    save(); renderListSelect();
  };
  document.getElementById('list-del').onclick = () => {
    if (state.lists.length <= 1) { alert('最後のプレイリストは削除できません'); return; }
    if (!confirm(`「${state.lists[state.active].name}」を削除しますか？`)) return;
    state.lists.splice(state.active, 1);
    switchList(Math.max(0, state.active - 1));
  };
});

// ---------- URL解析 ----------
// 戻り値: {ok:true, item} / {ok:false, reason} / null(空行)
function parseUrl(line) {
  line = line.trim().replace(/^[<\[(]+|[>\])]+$/g, ''); // マークダウン等の囲みを除去
  if (!line) return null;
  let m;
  if ((m = line.match(/(?:youtube\.com\/watch\?[^\s]*v=|youtu\.be\/|youtube\.com\/(?:shorts|live|embed|v)\/)([\w-]{11})/)))
    return { ok: true, item: { platform: 'yt', id: m[1], title: m[1] } };
  if ((m = line.match(/(?:nicovideo\.jp\/watch\/|nico\.ms\/)((?:sm|so|nm)?\d+)/)))
    return { ok: true, item: { platform: 'nico', id: m[1], title: m[1] } };
  // 未対応だが意図が分かるURLは理由を返す
  if (/youtube\.com\/(?:@|channel\/|c\/|user\/|playlist)/.test(line))
    return { ok: false, reason: 'チャンネル/再生リストURLは未対応（動画URLを貼ってください）' };
  if (/nicovideo\.jp\/(?:user\/|mylist|series)/.test(line))
    return { ok: false, reason: 'ユーザー/マイリストURLは未対応（動画URLを貼ってください）' };
  return { ok: false, reason: '認識できないURL: ' + line.slice(0, 60) };
}

// タイトル取得（noembed.com経由・失敗してもIDのまま動く）
async function fetchTitle(item) {
  const url = item.platform === 'yt'
    ? `https://www.youtube.com/watch?v=${item.id}`
    : `https://www.nicovideo.jp/watch/${item.id}`;
  try {
    const res = await fetch('https://noembed.com/embed?url=' + encodeURIComponent(url));
    const json = await res.json();
    if (json.title) { item.title = json.title; save(); renderList(); }
  } catch (e) { /* IDのまま表示 */ }
}

// ---------- リスト描画 ----------
const listEl = document.getElementById('playlist');
function renderList() {
  listEl.innerHTML = '';
  playlist.forEach((item, i) => {
    const li = document.createElement('li');
    li.className = item.platform + (i === currentIndex ? ' current' : '');
    li.draggable = true;
    li.dataset.index = i;
    li.innerHTML = `
      <span class="badge">${item.platform === 'yt' ? 'YT' : 'ニコ'}</span>
      <span class="title" title="${item.title}">${item.title}</span>
      <button class="del" title="削除">✕</button>`;
    li.querySelector('.title').onclick = () => play(i);
    li.querySelector('.del').onclick = (e) => {
      e.stopPropagation();
      playlist.splice(i, 1);
      if (currentIndex === i) currentIndex = -1;
      else if (currentIndex > i) currentIndex--;
      save(); renderList();
    };
    // ドラッグ並び替え
    li.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', i));
    li.addEventListener('dragover', e => { e.preventDefault(); li.classList.add('dragover'); });
    li.addEventListener('dragleave', () => li.classList.remove('dragover'));
    li.addEventListener('drop', e => {
      e.preventDefault(); li.classList.remove('dragover');
      const from = +e.dataTransfer.getData('text/plain');
      const to = i;
      if (from === to) return;
      const [moved] = playlist.splice(from, 1);
      playlist.splice(to, 0, moved);
      // currentIndex追従
      if (currentIndex === from) currentIndex = to;
      else if (from < currentIndex && to >= currentIndex) currentIndex--;
      else if (from > currentIndex && to <= currentIndex) currentIndex++;
      save(); renderList();
    });
    listEl.appendChild(li);
  });
}

// ---------- 追加 ----------
function addFromInput() {
  const input = document.getElementById('url-input');
  const status = document.getElementById('add-status');
  const results = input.value.split('\n').map(parseUrl).filter(Boolean);
  const added = results.filter(r => r.ok).map(r => r.item);
  const failed = results.filter(r => !r.ok);
  added.forEach(item => { playlist.push(item); fetchTitle(item); });
  if (added.length) { save(); renderList(); }
  if (added.length && !failed.length) {
    input.value = '';
    status.style.color = 'var(--accent)';
    status.textContent = `${added.length}件追加しました`;
  } else if (results.length === 0) {
    status.style.color = 'var(--nico)';
    status.textContent = 'URLを入力してから「追加」を押してください';
  } else {
    status.style.color = 'var(--nico)';
    status.textContent = (added.length ? `${added.length}件追加 / ` : '') + failed[0].reason
      + (failed.length > 1 ? ` ほか${failed.length - 1}行` : '');
  }
}
document.getElementById('add-btn').onclick = addFromInput;
// Ctrl+Enter でも追加
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); addFromInput(); }
});

// ---------- プレイヤー ----------
const slot = () => document.getElementById('player-slot');
let ytPlayer = null;
let ytReady = false;

// YouTube IFrame API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
window.onYouTubeIframeAPIReady = () => { ytReady = true; };

function clearPlayer() {
  if (ytPlayer) { try { ytPlayer.destroy(); } catch (e) {} ytPlayer = null; }
  const box = document.getElementById('player-box');
  box.innerHTML = '<div id="player-slot"></div>';
}

function play(i) {
  if (i < 0 || i >= playlist.length) return;
  currentIndex = i;
  const item = playlist[i];
  clearPlayer();
  document.getElementById('now-playing').textContent =
    `▶ [${item.platform === 'yt' ? 'YouTube' : 'ニコニコ'}] ${item.title}`;

  if (item.platform === 'yt') {
    ytPlayer = new YT.Player('player-slot', {
      videoId: item.id,
      playerVars: { autoplay: 1, rel: 0 },
      events: {
        onReady: (e) => e.target.setVolume(state.volume),
        onStateChange: (e) => { if (e.data === YT.PlayerState.ENDED) next(); }
      }
    });
  } else {
    const iframe = document.createElement('iframe');
    iframe.src = `https://embed.nicovideo.jp/watch/${item.id}?jsapi=1&playerId=1&persistence=1&from=0&autoplay=1`;
    iframe.allow = 'autoplay; fullscreen';
    iframe.allowFullscreen = true;
    slot().replaceWith(iframe);
  }
  renderList();
}

// ニコニコ埋め込みプレイヤーの終了検知（postMessage / playerStatus 4 = END）
window.addEventListener('message', (e) => {
  if (e.origin !== 'https://embed.nicovideo.jp') return;
  const d = e.data;
  if (!d) return;
  if (d.eventName === 'loadComplete') applyVolume(); // 読み込み完了時にマスターボリューム適用
  if (d.eventName === 'playerStatusChange' && d.data && d.data.playerStatus === 4) next();
  if (d.eventName === 'error') {
    const item = playlist[currentIndex];
    const watchUrl = item ? `https://www.nicovideo.jp/watch/${item.id}` : 'https://www.nicovideo.jp/';
    const np = document.getElementById('now-playing');
    const reason = d.data && d.data.code === 'externally_unwatchable'
      ? 'この動画は外部プレイヤーでの再生が許可されていません。'
      : 'ニコニコ側で再生エラー（埋め込みプレイヤーが再生を拒否）。';
    np.innerHTML = `⚠ ${reason} <a href="${watchUrl}" target="_blank" style="color:var(--accent)">ニコニコ動画で開く ↗</a>`
      + ` <button onclick="next()" style="margin-left:8px">スキップ ⏭</button>`;
  }
});

// ---------- 前後・シャッフル ----------
function next() {
  if (!playlist.length) return;
  if (shuffle && playlist.length > 1) {
    let r;
    do { r = Math.floor(Math.random() * playlist.length); } while (r === currentIndex);
    play(r);
  } else {
    play((currentIndex + 1) % playlist.length);
  }
}
document.getElementById('next-btn').onclick = next;
document.getElementById('prev-btn').onclick = () => {
  if (!playlist.length) return;
  play((currentIndex - 1 + playlist.length) % playlist.length);
};
document.getElementById('shuffle-btn').onclick = function () {
  shuffle = !shuffle;
  this.classList.toggle('active', shuffle);
};

// ---------- マスターボリューム ----------
function applyVolume() {
  const v = state.volume;
  if (ytPlayer && ytPlayer.setVolume) { try { ytPlayer.setVolume(v); } catch (e) {} }
  const nicoFrame = document.querySelector('#player-box iframe[src*="embed.nicovideo.jp"]');
  if (nicoFrame) nicoFrame.contentWindow.postMessage(
    { sourceConnectorType: 1, playerId: '1', eventName: 'volumeChange', data: { volume: v / 100 } },
    'https://embed.nicovideo.jp');
  document.getElementById('volume-label').textContent = v;
}
const volSlider = document.getElementById('volume-slider');
volSlider.value = state.volume;
volSlider.oninput = () => { state.volume = +volSlider.value; save(); applyVolume(); };
applyVolume();

renderListSelect();
renderList();
</script>
</body>
</html>
